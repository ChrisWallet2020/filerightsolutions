name: Dispatch Scheduled Emails

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Call scheduled email cron endpoint
        env:
          CRON_KEY: ${{ secrets.CRON_KEY }}
        run: |
          if [ -z "$CRON_KEY" ]; then
            echo "CRON_KEY secret is required."
            exit 1
          fi
          curl --fail --show-error --silent \
            -X POST "https://filerightsolutions.com/api/cron/send-scheduled-emails" \
            -H "x-cron-key: $CRON_KEY"
